services:
  airflow:
    image: apache/airflow:2.10.5-python3.12
    container_name: noxo_airflow
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "false"
      NOXO_PROJECT_ROOT: /opt/airflow/project
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-igcc_db}
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
      ETL_CHUNK_SIZE: ${ETL_CHUNK_SIZE:-50000}
      _PIP_ADDITIONAL_REQUIREMENTS: pandas python-dotenv psycopg2-binary
    ports:
      - "${AIRFLOW_PORT:-8080}:8080"
    volumes:
      - ../:/opt/airflow/project:ro
      - ../airflow/dags:/opt/airflow/dags:ro
      - airflow_logs:/opt/airflow/logs
      - airflow_home:/opt/airflow
    command: standalone
    networks: [noxo-net]

volumes:
  airflow_logs:
  airflow_home:
